<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Travel Map - Unlocked</title>
    <!-- Leaflet Open-Source Mapping CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; }
        #sidebar { width: 350px; background: #2c3e50; color: white; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; z-index: 1000; box-shadow: 2px 0 5px rgba(0,0,0,0.3); }
        #map { flex-grow: 1; height: 100%; background: #1a252f; }
        h2 { margin-top: 0; color: #1abc9c; }
        label { font-size: 14px; font-weight: bold; }
        select, input, button { width: 100%; padding: 10px; border-radius: 4px; border: none; box-sizing: border-box; }
        select, input { background: #34495e; color: white; margin-top: 5px; }
        button { background: #1abc9c; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px;}
        button:hover { background: #16a085; }
        .info-card { background: #34495e; padding: 15px; border-radius: 6px; margin-top: 15px; font-size: 14px; border-left: 4px solid #1abc9c; display: none; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Smart Travel Map</h2>
        
        <!-- Standard Filters - Now showing all 12 months -->
        <div>
            <label for="monthSelect">Target Month</label>
            <select id="monthSelect" onchange="renderMapLayers()">
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
                <option value="4">April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
        </div>

        <div>
            <label for="budgetInput">Max Daily Cost (USD)</label>
            <input type="number" id="budgetInput" value="300" oninput="renderMapLayers()">
        </div>

        <hr style="border-color: #465d75; width: 100%;">

        <!-- Built-in Smart Travel Assistant Input -->
        <div>
            <label for="aiPrompt">Ask Smart Travel Search</label>
            <input type="text" id="aiPrompt" placeholder="e.g., Thailand in October under 50 dollars">
            <button onclick="runAISearch()">Filter Map Instantly</button>
        </div>

        <!-- Dynamic Output Display Box -->
        <div id="infoBox" class="info-card"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

            }
          },
          "US": {

            "months": {

              "6": { "temp": 25, "flight_price": 600, "daily_cost": 180, "note": "Summer breaks kick off; busy theme parks." },
              "7": { "temp": 28, "flight_price": 700, "daily_cost": 200, "note": "Peak summer vacation time; expensive lodging." },
              "8": { "temp": 28, "flight_price": 680, "daily_cost": 195, "note": "Hot coastal beaches; high state-fair activities." },
              "9": { "temp": 23, "flight_price": 550, "daily_cost": 170, "note": "Ideal mountain conditions; summer crowd clears out." },
              "10": { "temp": 16, "flight_price": 480, "daily_cost": 150, "note": "Stunning autumn leaf changes across New England." },
              "11": { "temp": 10, "flight_price": 500, "daily_cost": 160, "note": "Holiday Thanksgiving rush; winter weather starts." },
              "12": { "temp": 5, "flight_price": 650, "daily_cost": 180, "note": "Festive window decorations and winter snow resorts." }
            }
          }
        };

        // EMBEDDED GEOMETRY DATA MAP (Eliminates CORS error blocks entirely)
        const localGeoJSON = {
            "type": "FeatureCollection",
            "features": [
                { "type": "Feature", "properties": { "ISO_A2": "US", "ADMIN": "United States" }, "geometry": { "type": "Polygon", "coordinates": [[[-125,24],[-125,49],[-67,49],[-67,24],[-125,24]]] } },
                { "type": "Feature", "properties": { "ISO_A2": "IT", "ADMIN": "Italy" }, "geometry": { "type": "Polygon", "coordinates": [[[7,46],[18,46],[18,36],[12,36],[7,46]]] } },
                { "type": "Feature", "properties": { "ISO_A2": "JP", "ADMIN": "Japan" }, "geometry": { "type": "Polygon", "coordinates": [[[129,31],[146,45],[142,46],[128,33],[129,31]]] } },
                { "type": "Feature", "properties": { "ISO_A2": "TH", "ADMIN": "Thailand" }, "geometry": { "type": "Polygon", "coordinates": [[[97,6],[106,6],[106,21],[97,21],[97,6]]] } },
                { "type": "Feature", "properties": { "ISO_A2": "ZA", "ADMIN": "South Africa" }, "geometry": { "type": "Polygon", "coordinates": [[[16,-35],[33,-35],[33,-22],[20,-22],[16,-35]]] } }
            ]
        };

        let map, geojsonLayer;

        function initMap() {
            // Setup Map viewport focus point
            map = L.map('map').setView([20, 0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
            }).addTo(map);
            
            renderMapLayers();
        }

        function renderMapLayers() {
            if (geojsonLayer) map.removeLayer(geojsonLayer);

            const activeMonth = document.getElementById('monthSelect').value;
            const maxBudget = parseFloat(document.getElementById('budgetInput').value);

            geojsonLayer = L.geoJSON(localGeoJSON, {
                style: function(feature) {
                    const isoCode = feature.properties.ISO_A2; 
                    const countryMatch = travelData[isoCode];
                    
                    if (countryMatch && countryMatch.months[activeMonth]) {
                        const monthInfo = countryMatch.months[activeMonth];
                        // If country is within user's daily financial parameter, paint it bright teal
                        if (monthInfo.daily_cost <= maxBudget) {
                            return { fillColor: '#1abc9c', weight: 2, opacity: 1, color: '#fff', fillOpacity: 0.6 };
                        }
                    }
                    // Out-of-bounds countries stay dark grey muted slate
                    return { fillColor: '#34495e', weight: 1, opacity: 0.5, color: '#7f8c8d', fillOpacity: 0.2 };
                },
                onEachFeature: function(feature, layer) {
                    layer.on('click', function() {
                        displayCountryDetails(feature.properties.ISO_A2, feature.properties.ADMIN);
                    });
                }
            }).addTo(map);
        }

        function displayCountryDetails(isoCode, fallbackName) {
            const activeMonth = document.getElementById('monthSelect').value;
            const countryMatch = travelData[isoCode];
            const infoBox = document.getElementById('infoBox');

            if (countryMatch && countryMatch.months[activeMonth]) {
                const stats = countryMatch.months[activeMonth];
                infoBox.style.display = "block";
                infoBox.innerHTML = `
                    <strong>${countryMatch.country}</strong><br>
                    ☀️ Avg Temperature: ${stats.temp}°C<br>
                    ✈️ Est Flight Cost: $${stats.flight_price}<br>
                    💰 Daily Expenses: $${stats.daily_cost}/day<br>
                    📝 <em>${stats.note}</em>
                `;
            } else {
                infoBox.style.display = "block";
                infoBox.innerHTML = `<strong>${fallbackName}</strong><br>No travel details configured for this selection.`;
            }
        }

        // Conversational AI interface local processing parser
        function runAISearch() {
            const text = document.getElementById('aiPrompt').value.toLowerCase();
            const infoBox = document.getElementById('infoBox');
            
            let detectedMonth = document.getElementById('monthSelect').value;
            let detectedBudget = document.getElementById('budgetInput').value;

            // Month text scanner
            if (text.includes("jan") || text.includes("january")) detectedMonth = "1";
            if (text.includes("feb") || text.includes("february")) detectedMonth = "2";
            if (text.includes("mar") || text.includes("march")) detectedMonth = "3";
            if (text.includes("apr") || text.includes("april")) detectedMonth = "4";
            if (text.includes("may")) detectedMonth = "5";
            if (text.includes("jun") || text.includes("june")) detectedMonth = "6";
            if (text.includes("jul") || text.includes("july")) detectedMonth = "7";
            if (text.includes("aug") || text.includes("august")) detectedMonth = "8";
            if (text.includes("sep") || text.includes("september")) detectedMonth = "9";
            if (text.includes("oct") || text.includes("october")) detectedMonth = "10";
            if (text.includes("nov") || text.includes("november")) detectedMonth = "11";
            if (text.includes("dec") || text.includes("december")) detectedMonth = "12";

            // Price parameter scanner
            const moneyMatches = text.match(/\d+/g);
            if (moneyMatches) {
                for (let num of moneyMatches) {
                    const parsedNum = parseInt(num);
                    if (parsedNum > 12) { // Prevents mixing calendar months with budget values
                        detectedBudget = parsedNum;
                        break;
                    }
                }
            }

            // Sync visual controls with parsed user text configurations
            document.getElementById('monthSelect').value = detectedMonth;
            document.getElementById('budgetInput').value = detectedBudget;

            infoBox.style.display = "block";
            infoBox.innerHTML = `✨ <strong>AI View Adjusted!</strong><br>Displaying targets for Month format [${detectedMonth}] under $${detectedBudget}/day.`;
            
            renderMapLayers();
        }

        window.onload = initMap;
    </script>
</body>
</html>
